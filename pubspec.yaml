name: flutter_app_boilerplate
description: A production-ready Flutter application with Clean Architecture
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  auto_route: ^11.1.0
  bloc: ^9.1.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.1
  dartz: ^0.10.1
  dio: ^5.9.0
  easy_localization: ^3.0.8
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.3
  freezed_annotation: ^3.1.0
  get_it: ^9.2.0
  google_fonts: ^6.3.3
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.5.4
  shimmer: ^3.0.0
  uuid: ^4.5.1

dev_dependencies:
  auto_route_generator: ^10.4.0
  bloc_test: ^10.0.0
  build_runner: ^2.10.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  hive_ce_generator: ^1.8.0
  json_serializable: ^6.9.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
